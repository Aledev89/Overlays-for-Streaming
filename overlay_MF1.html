<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * {{ margin: 0; padding: 0; box-sizing: border-box; }}
  
  html, body {{
    width: 100%;
    height: 100%;
    background: transparent !important;
    overflow: hidden;
  }}

  .overlay-container {{
    position: relative;
    width: 100vw;
    height: 100vh;
    background: transparent;
  }}

  /* Overlay PNG principale */
  .overlay-img {{
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    z-index: 10;
  }}

  /* LIVE indicator */
  .live-badge {{
    position: absolute;
    top: 18px;
    left: 22px;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 20;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,60,60,0.6);
    border-radius: 4px;
    padding: 3px 10px 3px 7px;
  }}

  .live-dot {{
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ff3c3c;
    animation: pulse-dot 1.4s ease-in-out infinite;
    box-shadow: 0 0 6px #ff3c3c;
  }}

  .live-text {{
    color: #ffffff;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(255,60,60,0.8);
  }}

  /* Glow pulsante sul frame (bordi) */
  .frame-glow {{
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 9;
    pointer-events: none;
    border-radius: 2px;
    animation: frame-glow-pulse 3s ease-in-out infinite;
    box-shadow:
      inset 0 0 30px rgba(120, 160, 255, 0.08),
      inset 0 0 60px rgba(100, 140, 255, 0.05);
  }}

  /* Shimmer sul nome BrainEater89 */
  .name-shimmer {{
    position: absolute;
    top: 0px;
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    height: 52px;
    z-index: 20;
    pointer-events: none;
    overflow: hidden;
  }}

  .name-shimmer::after {{
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.18),
      transparent
    );
    animation: shimmer 3.5s ease-in-out infinite;
  }}

  /* Particelle scintille */
  .particles {{
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 8;
    pointer-events: none;
  }}

  .particle {{
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(180, 200, 255, 0.8);
    border-radius: 50%;
    animation: float-particle linear infinite;
    box-shadow: 0 0 4px rgba(180, 200, 255, 0.6);
  }}

  /* Diana glow sottile */
  .diana-glow {{
    position: absolute;
    bottom: 0;
    right: 0;
    width: 280px;
    height: 420px;
    z-index: 9;
    pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(180,120,255,0.06) 0%, transparent 70%);
    animation: diana-breathe 4s ease-in-out infinite;
  }}

  /* KEYFRAMES */
  @keyframes pulse-dot {{
    0%, 100% {{ opacity: 1; transform: scale(1); }}
    50% {{ opacity: 0.4; transform: scale(0.7); }}
  }}

  @keyframes frame-glow-pulse {{
    0%, 100% {{ opacity: 0.6; }}
    50% {{ opacity: 1; }}
  }}

  @keyframes shimmer {{
    0% {{ left: -100%; }}
    60%, 100% {{ left: 150%; }}
  }}

  @keyframes float-particle {{
    0% {{ transform: translateY(0px) translateX(0px); opacity: 0; }}
    10% {{ opacity: 1; }}
    90% {{ opacity: 0.6; }}
    100% {{ transform: translateY(-80px) translateX(var(--drift)); opacity: 0; }}
  }}

  @keyframes diana-breathe {{
    0%, 100% {{ opacity: 0.5; transform: scale(1); }}
    50% {{ opacity: 1; transform: scale(1.05); }}
  }}
</style>
</head>

  <div class="name-shimmer"></div>

<script>
  // Genera particelle dinamiche
  const container = document.getElementById('particles');
  const count = 18;
  
  for (let i = 0; i < count; i++) {{
    const p = document.createElement('div');
    p.className = 'particle';
    
    const x = Math.random() * 100;
    const y = 60 + Math.random() * 35; // zona bassa-media
    const duration = 4 + Math.random() * 6;
    const delay = Math.random() * 8;
    const drift = (Math.random() - 0.5) * 40;
    const size = 1 + Math.random() * 2;
    
    p.style.cssText = `
      left: ${{x}}%;
      top: ${{y}}%;
      width: ${{size}}px;
      height: ${{size}}px;
      animation-duration: ${{duration}}s;
      animation-delay: ${{delay}}s;
      --drift: ${{drift}}px;
    `;
    container.appendChild(p);
  }}
</script>
